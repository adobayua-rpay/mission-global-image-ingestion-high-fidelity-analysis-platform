AWSTemplateFormatVersion: '2010-09-09'
Description: 'Foundation: Core IAM Roles with least-privilege policies.'
Parameters:
  Environment:
    Type: String
    Default: dev
Resources:
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole'
      Policies:
        - PolicyName: 'LambdaS3DynamoSQSAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # ... Specific, resource-scoped permissions for S3, DynamoDB, SQS ...
              - Effect: Allow
                Action: [ 's3:GetObject', 's3:PutObject' ]
                Resource: !Sub 'arn:aws:s3:::${Environment}-image-data-*/*'

  EC2InstanceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      # ... Policies for EC2 analysis instances ...

Outputs:
  LambdaExecutionRoleArn:
    Description: 'ARN for the core Lambda execution role'
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${Environment}-LambdaExecutionRoleArn'
